[project]
name = "mapsnap"
version = "0.1.0"
description = "Georeferencing tools for historical maps"
readme = "README.md"
requires-python = ">=3.12,<4.0"
dependencies = [
    "easyocr>=1.7.2",
    "haversine>=2.9.0",
    "levenshtein>=0.27.3",
    "matplotlib>=3.10.9",
    "numpy>=2.0",
    "pillow>=12.2.0",
    "tqdm>=4.67.1",
]

[tool.ruff]
line-length = 88

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "pytest>=9.0.2",
    "ruff>=0.15.1",
]
